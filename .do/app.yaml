# DigitalOcean App Platform spec (template).
# Replace YOUR_GITHUB_ORG/YOUR_REPO, branch, and env values. Apply via DO UI "App Spec" or doctl.
#
# doctl apps create --spec .do/app.yaml
#
name: futurus-api
region: nyc
services:
  - name: api
    github:
      repo: YOUR_GITHUB_ORG/YOUR_REPO
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_POSTGRESQL_PLUS_ASYNCPG_URL
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_REDIS_URL
      - key: CLERK_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE
      - key: CLERK_JWT_AUDIENCE
        scope: RUN_TIME
        type: SECRET
        value: REPLACE
      - key: ZEP_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE
      - key: MODEL_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE
      - key: LLM_BASE_URL
        scope: RUN_TIME
        value: https://inference.do-ai.run/v1
      - key: LLM_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_SAME_AS_MODEL_ACCESS_KEY
      - key: LLM_MODEL_TIER1
        scope: RUN_TIME
        value: REPLACE_DO_MODEL_ID
      - key: LLM_MODEL_TIER2
        scope: RUN_TIME
        value: REPLACE_DO_MODEL_ID
      - key: ENVIRONMENT
        scope: RUN_TIME
        value: production
      - key: BACKEND_URL
        scope: RUN_TIME
        value: REPLACE_AFTER_FIRST_DEPLOY_HTTPS_APP_URL
      - key: APP_DOMAIN
        scope: RUN_TIME
        value: your-frontend.example.com
      - key: FUTURUS_SIMULATION_WORKER_INLINE
        scope: RUN_TIME
        value: "true"
      - key: MAX_COST_PER_SIMULATION_USD
        scope: RUN_TIME
        value: "5"
