name: Deploy Futurus

# Frontend CI/CD only. Backend ships to Cloud Run via gcloud (see MANUAL_STEPS.md).
# Do not use Railway paths — they are obsolete.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-check:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python security scan
        working-directory: backend
        run: |
          pip install safety
          # Advisory only — do not block deploys on known transitive CVEs
          safety check --full-report || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Node security audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=critical || true

  test-backend:
    name: Backend import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Import FastAPI app
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/test
          CLERK_SECRET_KEY: test_clerk_secret_key_for_ci_only_xx
          ENVIRONMENT: development
          FUTURUS_SIMULATION_WORKER_INLINE: "true"
        run: python -c "from main import app; print(app.title)"

  deploy-frontend:
    name: Deploy to Vercel
    needs: [security-check]
    runs-on: ubuntu-latest
    # Vercel GitHub integration deploys frontend; keep this job disabled unless you configure secrets.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
