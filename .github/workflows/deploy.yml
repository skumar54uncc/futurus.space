name: Deploy Futurus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-check:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python security scan
        run: |
          cd futurus/backend
          pip install safety
          safety check --full-report || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: futurus/frontend/package-lock.json

      - name: Node security audit
        run: |
          cd futurus/frontend
          npm ci
          npm audit --audit-level=critical

  test-backend:
    name: Backend import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cd futurus/backend && pip install -r requirements.txt
      - run: cd futurus/backend && python -c "from main import app; print(app.title)"

  deploy-frontend:
    name: Deploy to Vercel
    needs: [security-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: futurus/frontend
          vercel-args: "--prod"

  deploy-backend:
    name: Deploy to Railway
    needs: [security-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: bervProject/railway-deploy@v1.0.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: futurus-backend
